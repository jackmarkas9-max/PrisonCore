name: PrisonCore
version: '${version}'
main: com.prisoncore.PrisonCore
api-version: '1.21'
description: A high-performance prison core plugin.
commands:
  pay:
    description: Pay money to another player.
    usage: /pay <player> <amount>
  requestpay:
    description: Request money from another player.
    usage: /requestpay <player> <amount> <reason...>
  setrank:
    description: Set a player's rank (works from console).
    usage: /setrank <player> <Admin|Guard|PCI|Prisoner>
  shop:
    description: Open the shop GUI.
    usage: /shop
  gang:
    description: Gang management.
    usage: /gang <create|invite|join|leave|disband|info|balance|deposit|chat>
  bounty:
    description: Bounty system.
    usage: /bounty <set|list>
  lottery:
    description: Buy a lottery ticket.
    usage: /lottery
  daily:
    description: Claim your daily reward.
    usage: /daily
  baltop:
    description: View top balances.
    usage: /baltop
  msg:
    description: Send a private message.
    usage: /msg <player> <message>
    aliases: [tell, whisper, w]
  reply:
    description: Reply to a message.
    usage: /reply <message>
    aliases: [r]
  r:
    description: Reply to a message.
    usage: /r <message>
  tpa:
    description: Request to teleport to a player.
    usage: /tpa <player>
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny

  # Admin Commands
  give:
    description: Give money to a player.
    usage: /give money <player> <amount>
    permission: prisoncore.admin
  day:
    description: Set time to day.
    usage: /day
    permission: prisoncore.admin
  night:
    description: Set time to night.
    usage: /night
    permission: prisoncore.admin
  setallspawn:
    description: Set the default spawn.
    usage: /setallspawn
    permission: prisoncore.admin
  setpolicespawn:
    description: Set the police spawn.
    usage: /setpolicespawn
    permission: prisoncore.admin
  setprisonspawn:
    description: Set the prison spawn.
    usage: /setprisonspawn
    permission: prisoncore.admin
  setpcispawn:
    description: Set the PCI spawn.
    usage: /setpcispawn
    permission: prisoncore.admin
  mode:
    description: Toggle build/prison mode.
    usage: /mode <build|prison>
    permission: prisoncore.admin
  save:
    description: Backup blocks around you.
    usage: /save
    permission: prisoncore.admin
  wandescape:
    description: Get the escape zone wand.
    usage: /wandescape
    permission: prisoncore.admin
  escape:
    description: Force-escape a player.
    usage: /escape <player>
    permission: prisoncore.admin
  setvent:
    description: Add a vent with ID.
    usage: /setvent <id>
    permission: prisoncore.admin
  clearmoney:
    description: Clear a player's money.
    usage: /clearmoney <player>
    permission: prisoncore.admin
  setcell:
    description: Get the cell zone wand.
    usage: /setcell
    permission: prisoncore.admin
  checkguy:
    description: View and confiscate a player's inventory.
    usage: /checkguy <player>
    permission: prisoncore.admin
  reqs:
    description: Show setup requirements status.
    usage: /reqs
    permission: prisoncore.admin
  darkshop:
    description: Open the dark shop (PCI & Prisoners only).
    usage: /darkshop
