# PrisonCore Configuration

# Day/Night Cycle Lengths (in ticks, 20 ticks = 1 second)
day-length: 12000
night-length: 6000

# Backup Settings
backup:
  radius: 25

# Spawn Locations (Populated via @setallspawn, @setpolicespawn, @setprisonspawn, @setPCIspawn)
spawns:
  all: null
  police: null
  prison: null
  pci: null

# Escape Zone (Set with @wandescape)
escape-zone:
  pos1: null
  pos2: null

# Cell Zone (Set with /setcell)
cell-zone:
  pos1: null
  pos2: null

# Vent Locations (Set with /setvent <id>)
# Format: [{id: 1, world: world, x: 0, y: 0, z: 0, yaw: 0, pitch: 0}]
vents: []
